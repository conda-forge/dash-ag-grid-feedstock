{% set name = "dash-ag-grid" %}
{% set version = "33.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dash_ag_grid-{{ version }}.tar.gz
  sha256: 7c646de0b19a1bc51ee09b8787bbba22293a6f2931bb31a47bb03d7194f6ace0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - dash >=2

test:
  imports:
    - dash_ag_grid
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://dash.plotly.com/dash-ag-grid
  summary: Dash wrapper around AG Grid, the best interactive data grid for the web.
  dev_url: https://github.com/plotly/dash-ag-grid
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - JohanMabille
