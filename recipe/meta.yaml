{% set name = "dash-ag-grid" %}
{% set version = "35.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dash_ag_grid-{{ version }}.tar.gz
  sha256: 012f7e7d5bff4862d1377ccb545ae2c80577e7909e118a88f1c408ff03a2403e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - dash >=2

test:
  imports:
    - dash_ag_grid
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://dash.plotly.com/dash-ag-grid
  summary: Dash wrapper around AG Grid, the best interactive data grid for the web.
  dev_url: https://github.com/plotly/dash-ag-grid
  license: MIT
  license_family: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - JohanMabille
